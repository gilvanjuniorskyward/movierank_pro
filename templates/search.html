<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-4">

<h2>🔍 Buscar Filme</h2>

<form method="POST">
    <input name="query" class="form-control mb-3" placeholder="Digite o nome do filme">
    <button class="btn btn-primary">Buscar</button>
</form>

<div class="row mt-4">
{% for m in results %}
<div class="col-md-3">
    <div class="card bg-dark text-white">
        <img src="https://image.tmdb.org/t/p/w500{{m.poster_path}}">
        <div class="card-body">
            <p>{{m.title}}</p>

            <form action="/add_movie" method="post">
                <input type="hidden" name="title" value="{{m.title}}">
                <input type="hidden" name="poster" value="{{m.poster_path}}">
                <button class="btn btn-success w-100">Adicionar</button>
            </form>

        </div>
    </div>
</div>
{% endfor %}
</div>

</div>

</body>
</html>
