<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieRank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #141414;
    color: white;
    font-family: Arial;
}

.navbar {
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}

.hero {
    height: 70vh;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: end;
    padding: 40px;
}

.hero h1 {
    font-size: 3rem;
    font-weight: bold;
}

.row-scroll {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding-bottom: 10px;
}

.row-scroll::-webkit-scrollbar {
    display: none;
}

.movie-card {
    min-width: 200px;
    cursor: pointer;
    transition: transform 0.3s;
}

.movie-card img {
    width: 100%;
    border-radius: 10px;
}

.movie-card:hover {
    transform: scale(1.15);
    z-index: 10;
}

.modal-content {
    border-radius: 15px;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar px-4 d-flex justify-content-between">
  <span class="navbar-brand text-white">🎬 MovieRank</span>

  <div>
    <a href="/search" class="btn btn-primary me-2">Buscar Filme</a>
    <a href="/logout" class="btn btn-danger">Sair</a>
  </div>
</nav>

<!-- HERO -->
{% if movies|length > 0 %}
<div class="hero" style="background-image: url('https://image.tmdb.org/t/p/original{{movies[0][0].poster}}')">
    <div>
        <h1>{{movies[0][0].title}}</h1>
        <p>⭐ {{movies[0][1] or 0}}</p>
    </div>
</div>
{% endif %}

<!-- LISTA -->
<div class="container mt-4">

<h3>🔥 Em alta</h3>

<div class="row-scroll">
{% for m, avg in movies %}

<!-- CARD (CLICÁVEL) -->
<div class="movie-card" data-bs-toggle="modal" data-bs-target="#modal{{m.id}}">
    <img src="https://image.tmdb.org/t/p/w500{{m.poster}}">
</div>

<!-- MODAL -->
<div class="modal fade" id="modal{{m.id}}" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white">

      <div class="modal-body">

        <div class="row">
          <div class="col-md-4">
            <img src="https://image.tmdb.org/t/p/w500{{m.poster}}" class="img-fluid rounded">
          </div>

          <div class="col-md-8">
            <h2>{{m.title}}</h2>
            <p>⭐ {{avg or 0}}</p>

            <!-- AVALIAR -->
            <form action="/rate/{{m.id}}" method="post">
              <input type="number" name="score" min="1" max="10" class="form-control mb-2" placeholder="Sua nota">
              <button class="btn btn-success w-100">Avaliar</button>
            </form>

            <!-- BOTÃO FECHAR -->
            <button class="btn btn-secondary mt-2 w-100" data-bs-dismiss="modal">Fechar</button>

          </div>
        </div>

      </div>

    </div>
  </div>
</div>

{% endfor %}
</div>

</div>

<!-- BOOTSTRAP JS (OBRIGATÓRIO) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
