<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieRank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #141414;
    color: white;
    font-family: Arial;
}

/* NAVBAR */
.navbar {
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}

/* HERO (filme destaque) */
.hero {
    height: 70vh;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: end;
    padding: 40px;
}

.hero h1 {
    font-size: 3rem;
    font-weight: bold;
}

/* CARROSSEL */
.row-scroll {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding-bottom: 10px;
}

.row-scroll::-webkit-scrollbar {
    display: none;
}

/* CARD */
.movie-card {
    min-width: 200px;
    transition: transform 0.3s;
}

.movie-card img {
    width: 100%;
    border-radius: 10px;
}

.movie-card:hover {
    transform: scale(1.15);
    z-index: 10;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar px-4">
  <span class="navbar-brand text-white">🎬 MovieRank</span>
  <a href="/logout" class="btn btn-danger">Sair</a>
</nav>

<!-- HERO -->
{% if movies|length > 0 %}
<div class="hero" style="background-image: url('https://image.tmdb.org/t/p/original{{movies[0][0].poster}}')">
    <div>
        <h1>{{movies[0][0].title}}</h1>
        <p>⭐ {{movies[0][1] or 0}}</p>
    </div>
</div>
{% endif %}

<!-- LISTA -->
<div class="container mt-4">

<h3>🔥 Em alta</h3>
<div class="row-scroll">
{% for m, avg in movies %}
<div class="movie-card">
    <img src="https://image.tmdb.org/t/p/w500{{m.poster}}">
    <p class="mt-2">{{m.title}}</p>
    <p>⭐ {{avg or 0}}</p>
</div>
{% endfor %}
</div>

</div>

</body>
</html>
