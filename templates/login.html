<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - MovieRank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') no-repeat center center/cover;
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* overlay escuro */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

/* card login */
.login-box {
    position: relative;
    z-index: 2;
    background: rgba(0,0,0,0.85);
    padding: 40px;
    border-radius: 10px;
    width: 350px;
}

.login-box h2 {
    color: white;
    margin-bottom: 20px;
    font-weight: bold;
}

.form-control {
    background: #333;
    border: none;
    color: white;
}

.form-control:focus {
    background: #444;
    color: white;
    box-shadow: none;
}

.btn-login {
    background: #e50914;
    border: none;
    font-weight: bold;
}

.btn-login:hover {
    background: #f6121d;
}

.register-link {
    color: #bbb;
    font-size: 0.9rem;
}

.register-link a {
    color: white;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="overlay"></div>

<div class="login-box">

    <h2>Entrar</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" class="form-control mb-3" placeholder="Usuário" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Senha" required>

        <button class="btn btn-login w-100">Entrar</button>
    </form>

    <p class="register-link mt-3">
        Novo por aqui? <a href="/register">Criar conta</a>
    </p>

</div>

</body>
</html>
